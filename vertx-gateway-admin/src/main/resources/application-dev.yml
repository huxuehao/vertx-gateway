server:
  port: 8060
spring:
  redis:
    host: 127.0.0.1
    port: 6379
    password: Redis@dhcc123.com
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vertx-gateway?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC
    username: root
    password: root123123
    druid:
      # ===== 连接池大小 =====
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 3000

      # ===== 连接保活与逐出（核心：防防火墙切断） =====
      time-between-eviction-runs-millis: 30000
      min-evictable-idle-time-millis: 240000
      max-evictable-idle-time-millis: 900000
      keep-alive: true

      # ===== 连接有效性检测 =====
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false

      # ===== MySQL优化 =====
      pool-prepared-statements: false
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=15000
      remove-abandoned: true
      remove-abandoned-timeout: 300
      log-abandoned: true

      # ===== 内置Filter =====
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 15000
        wall:
          enabled: true
          multi-statement-allow: true

      # Web监控页面（仅开发环境开启）
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true

# mybatis-plus配置
mybatis-plus:
  configuration:
    # SQL日志设置
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    # 驼峰命名
    map-underscore-to-camel-case: true

# 日志级别
logging:
  level:
    com.hxh: debug #off
